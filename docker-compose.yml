

version: "3.9"
services:
  web:
    build: .
    container_name: node_web
    ports:
      - "3002:3000"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: mongo_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data:  
